map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream homostay_app_puma {
  server unix:/var/www/homostay_app/server/tmp/sockets/puma.sock fail_timeout=0;
}

server {
  listen 80;
  server_name thesacredhomes.com www.thesacredhomes.com;

  root /var/www/homostay_app/server/public;
  client_max_body_size 25m;

  access_log /var/log/nginx/homostay_app.access.log;
  error_log /var/log/nginx/homostay_app.error.log warn;

  location /vite/ {
    alias /var/www/homostay_app/server/public/vite/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  location /assets/ {
    alias /var/www/homostay_app/server/public/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  location ~ ^/(robots\.txt|favicon\.ico|apple-touch-icon.*\.png)$ {
    try_files $uri @rails;
    expires 1y;
    access_log off;
  }

  location /cable {
    proxy_pass http://homostay_app_puma;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600;
  }

  location /up {
    proxy_pass http://homostay_app_puma;
    access_log off;
  }

  location / {
    try_files $uri @rails;
  }

  location @rails {
    proxy_pass http://homostay_app_puma;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_redirect off;
    proxy_read_timeout 60;
    proxy_connect_timeout 5;
  }

  location ~ /\.(?!well-known) {
    deny all;
  }
}
