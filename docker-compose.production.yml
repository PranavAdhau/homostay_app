services:
  rails:
    environment:
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?Set SECRET_KEY_BASE to a strong random value}
      HOMOSTAY_APP_DATABASE_PASSWORD: ${HOMOSTAY_APP_DATABASE_PASSWORD:?Set HOMOSTAY_APP_DATABASE_PASSWORD to the PostgreSQL password}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?Set TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:?Set TELEGRAM_CHAT_ID}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:?Set WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:?Set WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_BUSINESS_ACCOUNT_ID: ${WHATSAPP_BUSINESS_ACCOUNT_ID:?Set WHATSAPP_BUSINESS_ACCOUNT_ID}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:?Set WHATSAPP_WEBHOOK_VERIFY_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:?Set WHATSAPP_APP_SECRET}
      ADMIN_WHATSAPP_NUMBER: ${ADMIN_WHATSAPP_NUMBER:?Set ADMIN_WHATSAPP_NUMBER}
    ports: []
    expose:
      - "3000"

  sidekiq:
    environment:
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?Set SECRET_KEY_BASE to a strong random value}
      HOMOSTAY_APP_DATABASE_PASSWORD: ${HOMOSTAY_APP_DATABASE_PASSWORD:?Set HOMOSTAY_APP_DATABASE_PASSWORD to the PostgreSQL password}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?Set TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:?Set TELEGRAM_CHAT_ID}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:?Set WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:?Set WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_BUSINESS_ACCOUNT_ID: ${WHATSAPP_BUSINESS_ACCOUNT_ID:?Set WHATSAPP_BUSINESS_ACCOUNT_ID}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:?Set WHATSAPP_WEBHOOK_VERIFY_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:?Set WHATSAPP_APP_SECRET}
      ADMIN_WHATSAPP_NUMBER: ${ADMIN_WHATSAPP_NUMBER:?Set ADMIN_WHATSAPP_NUMBER}

  nginx:
    image: nginx:1.28-bookworm
    depends_on:
      rails:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
